version: "1.2.0"
tagline: Solo mine Bitcoin with a 1 BTC finder bonus and shared block rewards
description: >-
  BASED Pool Dashboard connects your Umbrel and your miners to BASED Mining
  Pool, a solo Bitcoin pool with a 0% fee and a hybrid payout enforced by the
  coinbase transaction itself.


  The hybrid split is the core difference from classic solo mining. When the
  pool finds a block, the miner who found it receives 1 BTC, and the remaining
  reward, about 2.125 BTC plus transaction fees, is split among all active
  miners in proportion to the shares they submitted that round. You do not need
  to find the block yourself to get paid when the pool wins. The split is
  written into the coinbase transaction and enforced by Bitcoin consensus, not
  by trust in the operator.


  Miner auto-discovery: scan your local network for Bitaxe family AxeOS miners
  and switch a device to BASED Pool in one click, or add a device by IP. The app
  shows the exact stratum settings before writing anything and never changes a
  device without your explicit per device confirmation.


  Live dashboard: pool hashrate, workers online, accepted shares, best share,
  uptime, and blocks found, refreshed every 30 seconds from the public BASED
  Pool API.


  My Stats: enter a Bitcoin address to see its hashrate, accepted shares, best
  share, per worker breakdown, current share of pool contribution, and the
  estimated payout that share represents if a block were found now.


  Three stratum ports: 3333 standard for Bitaxe, NerdQaxe, and most home miners.
  3335 low difficulty for NerdMiner and ESP32 lottery miners. 3336 high
  difficulty for rented hashpower from NiceHash and MRR.


  This app is read-only against the pool. Your mining hardware connects directly
  to pool.basedmining.xyz. Built on a patched ckpool, the same battle-tested
  pool software lineage as solo.ckpool.org.
